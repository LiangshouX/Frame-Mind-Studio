# Prometheus 配置
# 采集 Spring Boot Actuator、OTel Agent、Tempo 指标

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator / Micrometer 指标
  - job_name: "spring-boot-actuator"
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s

  # OTel Agent 暴露的 Prometheus 指标
  - job_name: "otel-agent"
    static_configs:
      - targets: ["backend:9464"]
        labels:
          service: "frame-mind-studio"

  # Tempo 自身指标
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
