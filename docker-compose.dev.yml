services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-framemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-framemind_dev}
      POSTGRES_DB: ${POSTGRES_DB:-framemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framemind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  openclaw-dev:
    image: openclaw/openclaw:latest
    ports:
      - "18080:8080"
    volumes:
      - ./openclaw-config/config.dev.json5:/etc/openclaw/config.json5:ro
      - ./data/openclaw-dev:/var/lib/openclaw
    environment:
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET:-dev-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data_dev:
