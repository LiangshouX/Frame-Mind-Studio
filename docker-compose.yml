version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-framemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-framemind_dev}
      POSTGRES_DB: ${POSTGRES_DB:-framemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framemind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9464:9464"   # OTel Prometheus scrape endpoint
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-framemind}
      DB_USER: ${POSTGRES_USER:-framemind}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-framemind_dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      FERNET_KEY: ${FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alloy:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

  # ─── 可观测性栈 ───
  alloy:
    image: grafana/alloy:v1.7.5
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./observability/config.alloy:/etc/alloy/config.alloy:ro
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.1
    ports:
      - "3200:3200"
    command: -config.file=/etc/tempo/config.yml
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  tempo_data:
  prometheus_data:
  grafana_data:
