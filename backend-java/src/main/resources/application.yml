server:
  port: 8080

spring:
  application:
    name: frame-mind-studio
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:framemind}
    username: ${DB_USER:framemind}
    password: ${DB_PASSWORD:framemind}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE

# FrameMind custom config
framemind:
  config:
    path: ${FRAMEMIND_CONFIG_PATH:${user.home}/.framemind}
  encryption:
    key: ${FERNET_KEY:}
  budget:
    default-token-limit: 1000000
    warning-threshold: 0.80
  # OpenClaw 引擎配置（Webhook 模式）
  openclaw:
    gateway-url: ${OPENCLAW_GATEWAY_URL:http://47.108.28.113:13015}
    webhook-route-id: ${OPENCLAW_WEBHOOK_ROUTE_ID:platform}
    webhook-secret: ${OPENCLAW_WEBHOOK_SECRET:framemind}
    enabled: ${OPENCLAW_ENABLED:true}
    request-timeout-ms: ${OPENCLAW_REQUEST_TIMEOUT_MS:120000}
    connect-timeout-ms: ${OPENCLAW_CONNECT_TIMEOUT_MS:10000}
    poll-interval-ms: ${OPENCLAW_POLL_INTERVAL_MS:2000}
    max-poll-retries: ${OPENCLAW_MAX_POLL_RETRIES:120}

# Actuator / Prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    io.framemind: DEBUG
