server:
  port: 8080

spring:
  application:
    name: frame-mind-studio
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:framemind}
    username: ${DB_USER:framemind}
    password: ${DB_PASSWORD:framemind}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE

# AgentScope configuration
agentscope:
  model:
    provider: ${AI_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model-name: ${OPENAI_MODEL:gpt-4o}
    stream: true
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model-name: ${DASHSCOPE_MODEL:qwen-max}
    stream: true

# FrameMind custom config
framemind:
  config:
    path: ${FRAMEMIND_CONFIG_PATH:${user.home}/.framemind}
  encryption:
    key: ${FERNET_KEY:}
  budget:
    default-token-limit: 1000000
    warning-threshold: 0.80

# Actuator / Prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    io.framemind: DEBUG
    io.agentscope: INFO
