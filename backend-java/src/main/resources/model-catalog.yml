    name: "DeepSeek"
    description: "DeepSeek AI — 高性价比推理与对话模型"
    type: OPENAI_COMPATIBLE
    defaultBaseUrl: "https://api.deepseek.com"
    availableModels:
      - "deepseek-chat"
      - "deepseek-reasoner"
    icon: "deepseek"

  qianwen:
    name: "通义千问"
